<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Sign Up</title>
<link rel="stylesheet" href="../css/login.css">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="main">
        <header class="header">
            <a href="home.html" class="logo">Quiz.</a>
        </header>
    </div>
    <div class="wrapper">
        <form action="../jsp/signupProcess.jsp">
            <h1>SIGNUP</h1>
            <div class="input-box">
                <input type="text" placeholder="First Name" name="fname" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Last Name" name="lname" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="email" placeholder="Mail" name="email" required>
                <i class='bx bxl-gmail'></i>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Username" name="userid"required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" name="password" required>
                <i class='bx bxs-lock-alt' ></i>
            </div>
            <button type="submit" class="btn">Sign up</button>
            <div class="register-link">
                <p>Have have an acount?<a
                href="login.html">Login
                </a></p>
            </div>
        </form>
    </div>
</body>
</html>
