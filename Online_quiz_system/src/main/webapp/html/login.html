<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Login</title>
<link rel="stylesheet" href="../css/login.css">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="main">
        <header class="header">
            <a href="home.html" class="logo">Quiz.</a>
        </header>
    </div>
    <div class="wrapper">
        <form action="../jsp/login.jsp" method="post">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" name="userid" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" name="password" required>
                <i class='bx bxs-lock-alt' ></i>
            </div>
            <!-- <div id="errorMessage" class="error-message">Invalid Username or Password</div> -->
            <div class="remember-forgot">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn">Login</button>
            <div class="register-link">
                <p>Don't have an account?<a
                href="signup.html">Register
                </a></p>
            </div>
        </form>
    </div>
    <script src="../js/showerror.js"></script>
</body>
</html>
